services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quali
      POSTGRES_PASSWORD: quali
      POSTGRES_DB: quali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quali -d quali"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SCOPE: local
      DATABASE_URL: postgresql+asyncpg://quali:quali@db:5432/quali
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
